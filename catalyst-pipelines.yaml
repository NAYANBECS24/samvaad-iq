version: 1
runners:
  Machine:
    config-id: 2
images:
  DeployMachine:
    image: ubuntu
    auth:
      username: << env.USER_NAME >>
      password: << env.USER_PASSWORD >>
jobs:
  Build_Test_Deploy:
    steps:
      - apt-get update
      - apt-get -y install curl ca-certificates
      - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
      - apt-get install -y nodejs
      - node --version
      - npm --version
      - npm ci --ignore-scripts
      - npm --prefix client ci
      - npm --prefix functions/api ci
      - npm run generate:data
      - git diff --exit-code -- data/generated
      - npm run client:lint
      - npm run build
      - npm test
      - npx playwright install --with-deps chromium
      - npm run browser:test
      - npm --prefix client audit --omit=dev --audit-level=high
      - npm --prefix functions/api audit --omit=dev --audit-level=high
      - npm i -g zcatalyst-cli
      - catalyst -v
      - catalyst deploy --project << env.PROJECT_ID >> --org << env.CATALYST_ORG >> --token << env.CATALYST_TOKEN >>
stages:
  - name: build-test-deploy
    image: DeployMachine
    jobs:
      - Build_Test_Deploy
